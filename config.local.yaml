server:
  port: ":8000"
  # dev prod
  mode: "dev"
  allow_register: true
  # 全局服务开关
  enable: true

db:
  mysql_dsn:
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600 # 秒
  # 重试次数
  connect_max_retries: 20
  # 重试等待时间(秒)
  connect_retry_interval: 3

jwt:
  # 测试密钥
  access_secret:
  refresh_secret:
  rotate_refresh_tokens: true
  blacklist_after_rotation: true

# Prometheus 监控配置
prometheus:
  enable: true
  http_addr: "127.0.0.1:8001"

llm:
  # .env 文件配置
  api_key:
  api_base:
  model_name: "deepseek-v3.2"
  embedding_model: "text-embedding-v4"
  embedding_dimensions: 1024
  embedding_batchsize: 10

qdrant:
  # .env
  api_key:
  host: "127.0.0.1"
  http_port: 6333
  grpc_port: 6334
  collection: "my_knowledge"
  top_k: 3