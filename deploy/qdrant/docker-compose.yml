services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - TZ=Asia/Shanghai
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required in .env}
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 1g
    cpus: 1.0
volumes:
  qdrant_data: