services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - 9090:9090

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
      # mysql 初始化脚本
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  meilisearch:
    image: getmeili/meilisearch:v1.40.0
    container_name: meilisearch
    restart: unless-stopped
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY}
    ports:
      - 7700:7700
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s


  aifriend:
    image: aifriend-go:1.0
    container_name: aifriend
    restart: unless-stopped
    command: ["--config-file=/app/config/config.yaml"]
    ports:
      - 8000:8000
      - 8001:8001
    volumes:
      # 配置文件
      - ./config:/app/config
      # 头像文件
      - ./media:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      # db
      - DB_MYSQL_DSN=${DB_MYSQL_DSN}
      # jwt
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      # api key
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE}
      # qdrant
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      # meilisearch
      - MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  prometheus_data:
  grafana_data:
  mysql_data:
  meili_data: